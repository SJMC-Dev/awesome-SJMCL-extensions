name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  markdown-lint:
    name: Markdown Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
          config: ".github/markdownlint.jsonc"

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --exclude-path "org.sjmcl.clock"
            --exclude "https://img.shields.io"
            --exclude "https://github.com/.*/stargazers"
            --no-progress
            "**/*.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  plugin-structure:
    name: Plugin Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin folders
        run: bash .github/scripts/check-plugin-structure.sh
